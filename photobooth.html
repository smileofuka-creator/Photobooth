<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7f0e3">
<title>✦ SketchBooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Pacifico&family=Bungee&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  :root {
    --cream: #f7f0e3;
    --warm: #ede3d0;
    --tan: #d4c4a8;
    --brown: #8b6a4a;
    --dark: #2a1f14;
    --accent: #c8452a;
  }

  body {
    background: var(--cream);
    font-family: 'Caveat', cursive;
    color: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.012) 2px, rgba(0,0,0,0.012) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.012) 2px, rgba(0,0,0,0.012) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  .app {
    position: relative; z-index: 2;
    max-width: 1000px; margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }

  /* HEADER */
  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 7vw, 3.5rem);
    color: var(--dark); letter-spacing: -1px; line-height: 1;
  }
  header h1 em { color: var(--accent); font-style: italic; }
  header p { font-size: 1.1rem; color: var(--brown); margin-top: 0.2rem; }
  .deco-line {
    display: flex; align-items: center; justify-content: center;
    gap: 1rem; margin: 0.5rem 0; color: var(--tan); font-size: 1.2rem;
  }
  .deco-line::before, .deco-line::after {
    content: ''; flex: 1; max-width: 100px; height: 1px;
    background: linear-gradient(to right, transparent, var(--tan));
  }
  .deco-line::after { background: linear-gradient(to left, transparent, var(--tan)); }

  /* START */
  #start-screen {
    text-align: center; padding: 2.5rem 1.5rem;
    border: 3px dashed var(--tan); border-radius: 12px;
    max-width: 500px; margin: 0 auto;
  }
  .big-icon { font-size: 4rem; margin-bottom: 0.5rem; }
  #start-screen p { font-size: 1.15rem; color: var(--brown); margin-bottom: 1.2rem; line-height: 1.5; }
  .btn-start {
    display: inline-block;
    padding: 0.9rem 2.5rem;
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    color: var(--cream); background: var(--accent);
    border: 3px solid var(--dark); border-radius: 6px;
    cursor: pointer; box-shadow: 5px 5px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
    touch-action: manipulation;
  }
  .btn-start:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--dark); }

  /* MAIN */
  .main { display: grid; grid-template-columns: 1fr 280px; gap: 1.5rem; align-items: flex-start; }

  /* CAMERA */
  .camera-wrap {
    position: relative;
    border: 3px solid var(--dark);
    border-radius: 6px;
    overflow: hidden;
    background: #111;
    aspect-ratio: 4/3;
    box-shadow: 6px 6px 0 var(--brown);
  }
  #video {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transform: scaleX(-1);
  }
  #video.no-mirror { transform: none; }
  #canvas { display: none; }

  .countdown-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
    z-index: 10; opacity: 0;
    transition: opacity 0.2s; pointer-events: none;
  }
  .countdown-overlay.show { opacity: 1; }
  .countdown-num {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(5rem, 15vw, 8rem); color: white;
    text-shadow: 0 0 30px rgba(200,69,42,0.8);
    animation: pop 0.4s ease; line-height: 1;
  }
  .countdown-label {
    font-family: 'Caveat', cursive;
    font-size: 1.3rem; color: rgba(255,255,255,0.85);
    margin-top: 0.3rem;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .flash {
    position: absolute; inset: 0; background: white;
    z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity 0.08s;
  }
  .flash.go { opacity: 1; }

  .cam-toolbar {
    position: absolute; top: 8px; right: 8px;
    z-index: 6; display: flex; gap: 6px;
  }
  .cam-btn {
    width: 38px; height: 38px;
    background: rgba(0,0,0,0.5);
    color: white; border: none; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .cam-btn:active { background: rgba(0,0,0,0.8); }

  /* PROGRESS */
  .progress-dots {
    display: flex; justify-content: center; gap: 10px; margin: 0.8rem 0;
  }
  .dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--brown); background: transparent;
    transition: all 0.3s;
  }
  .dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.2); }
  .dot.done { background: var(--brown); border-color: var(--brown); }

  /* CONTROLS PANEL */
  .ctrl-section { margin-bottom: 1rem; }
  .ctrl-label {
    font-size: 0.95rem; color: var(--brown);
    text-align: center; margin-bottom: 0.4rem;
    letter-spacing: 0.5px;
  }

  .filters {
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  .filter-btn, .style-btn {
    font-family: 'Caveat', cursive;
    font-size: 1rem;
    padding: 3px 12px;
    border: 2px solid var(--tan); border-radius: 30px;
    background: transparent; color: var(--brown);
    cursor: pointer; transition: all 0.15s;
    touch-action: manipulation;
  }
  .filter-btn.active, .style-btn.active {
    background: var(--dark); color: var(--cream); border-color: var(--dark);
  }

  /* FILTERS CSS */
  .f-bw { filter: grayscale(1); }
  .f-sepia { filter: sepia(0.85) contrast(1.05); }
  .f-warm { filter: sepia(0.3) saturate(1.3) brightness(1.05); }
  .f-cool { filter: saturate(0.7) hue-rotate(20deg) brightness(0.95); }
  .f-vivid { filter: saturate(1.8) contrast(1.1); }
  .f-soft { filter: brightness(1.08) contrast(0.95) saturate(0.85); }

  /* BUTTONS */
  .btn-shoot, .btn-download {
    display: block; width: 100%;
    padding: 0.9rem; margin-top: 0.6rem;
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem; letter-spacing: 0.5px;
    color: var(--cream); background: var(--accent);
    border: 3px solid var(--dark); border-radius: 6px;
    cursor: pointer; box-shadow: 4px 4px 0 var(--dark);
    transition: transform 0.1s, box-shadow 0.1s;
    touch-action: manipulation;
  }
  .btn-download { background: var(--dark); box-shadow: 4px 4px 0 var(--brown); }
  .btn-shoot:active, .btn-download:active {
    transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--dark);
  }
  .btn-shoot:disabled, .btn-download:disabled {
    background: var(--tan); cursor: not-allowed; box-shadow: 2px 2px 0 var(--tan); transform: none;
  }
  .btn-reset {
    display: block; width: 100%; margin-top: 0.5rem;
    padding: 0.5rem;
    font-family: 'Caveat', cursive; font-size: 1.05rem;
    color: var(--brown); background: transparent;
    border: 2px solid var(--tan); border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
    touch-action: manipulation;
  }
  .btn-reset:hover { border-color: var(--brown); color: var(--dark); }

  /* STRIP PANEL */
  .strip-panel { position: sticky; top: 1rem; }
  .strip-wrap { text-align: center; }

  .film-strip {
    background: #e8dcc8;
    border: 3px solid #2a1f14;
    border-radius: 4px;
    padding: 14px 12px;
    box-shadow: 5px 5px 0 #8b6a4a;
    transition: all 0.3s;
    display: inline-block;
    width: 100%; max-width: 240px;
  }
  .strip-header, .strip-footer {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #8b6a4a;
    letter-spacing: 1.5px;
    text-align: center;
    padding: 4px 0;
    min-height: 18px;
  }
  .strip-header { font-size: 0.85rem; font-family: 'Caveat', cursive; letter-spacing: 0; }
  .strip-deco-row {
    display: flex; justify-content: space-around;
    padding: 4px 2px;
    font-size: 0.8rem;
    color: #2a1f14;
  }
  .photo-slot {
    position: relative; width: 100%;
    aspect-ratio: 4/3;
    background: rgba(0,0,0,0.08);
    border: 2px dashed rgba(139,106,74,0.4);
    overflow: hidden;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-slot .empty-icon {
    font-family: 'Caveat', cursive;
    font-size: 1.8rem;
    opacity: 0.4;
  }
  .photo-gap { height: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* THEME PICKER */
  .theme-cats {
    display: flex; gap: 4px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 0.5rem;
  }
  .cat-btn {
    font-family: 'Caveat', cursive;
    font-size: 1rem;
    padding: 4px 12px;
    border: 2px solid transparent; border-bottom: 2px solid transparent;
    background: transparent;
    color: var(--brown); cursor: pointer;
    border-radius: 20px;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .cat-btn.active {
    background: var(--warm);
    color: var(--dark);
    border-color: var(--tan);
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
    padding: 4px;
    border: 1px dashed var(--tan);
    border-radius: 6px;
    background: rgba(255,255,255,0.4);
  }
  .theme-card {
    cursor: pointer;
    border: 2px solid transparent;
    border-radius: 5px;
    padding: 4px;
    transition: all 0.15s;
    text-align: center;
    touch-action: manipulation;
  }
  .theme-card.active { border-color: var(--dark); transform: scale(1.05); }
  .theme-swatch {
    width: 100%; aspect-ratio: 3/4;
    border-radius: 3px;
    border: 1.5px solid rgba(0,0,0,0.2);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 0.6rem;
    overflow: hidden;
    position: relative;
  }
  .theme-swatch .icon { font-size: 1.4rem; line-height: 1; }
  .theme-name {
    font-size: 0.8rem;
    color: var(--dark);
    margin-top: 2px;
    line-height: 1.1;
  }

  /* CUSTOM TEXT */
  .custom-text {
    width: 100%;
    font-family: 'Caveat', cursive;
    font-size: 1rem;
    padding: 6px 10px;
    border: 2px solid var(--tan);
    border-radius: 6px;
    background: rgba(255,255,255,0.5);
    color: var(--dark);
    text-align: center;
  }
  .custom-text:focus { outline: none; border-color: var(--brown); }

  /* DONE BADGE */
  .done-badge {
    text-align: center; padding: 0.6rem;
    background: var(--warm); border: 2px solid var(--tan);
    border-radius: 6px; margin-top: 0.6rem;
    font-size: 1.05rem; color: var(--brown);
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .cam-error {
    text-align: center; padding: 1.5rem 1rem; color: var(--accent); font-size: 1.05rem;
  }

  /* MOBILE */
  @media (max-width: 720px) {
    .main { grid-template-columns: 1fr; gap: 1rem; }
    .strip-panel { position: static; }
    .film-strip { max-width: 200px; }
    .app { padding: 1rem 0.8rem 5rem; }
    header { margin-bottom: 1rem; }
    .ctrl-section { margin-bottom: 0.8rem; }
    .filter-btn, .style-btn { font-size: 0.95rem; padding: 4px 12px; }
    .theme-grid { max-height: 170px; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); }
    .btn-shoot, .btn-download { font-size: 1.2rem; padding: 0.85rem; }
  }

  /* SCROLLBAR */
  .theme-grid::-webkit-scrollbar { width: 6px; }
  .theme-grid::-webkit-scrollbar-track { background: transparent; }
  .theme-grid::-webkit-scrollbar-thumb { background: var(--tan); border-radius: 3px; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="app">
  <header>
    <h1>✦ Sketch<em>Booth</em></h1>
    <div class="deco-line">✦</div>
    <p>гэрийн photo booth — олон загвар, утсан дээр ажиллана</p>
  </header>

  <div id="start-screen">
    <div class="big-icon">📷</div>
    <p>4 зураг авна. 14+ загвараар чимэглэж<br>JPG болгон татаж аваарай!</p>
    <button class="btn-start" onclick="initCamera()">Эхлэх ✦</button>
  </div>

  <div class="main" id="main-content" style="display:none">
    <!-- LEFT: BOOTH -->
    <div class="booth-side">
      <div class="camera-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="cam-toolbar">
          <button class="cam-btn" id="btn-flip" onclick="flipCamera()" title="Камер солих">↻</button>
        </div>
        <div class="countdown-overlay" id="overlay">
          <div class="countdown-num" id="count-num">3</div>
          <div class="countdown-label" id="count-label">Бэлэн боллоо!</div>
        </div>
        <div class="flash" id="flash"></div>
      </div>

      <div class="progress-dots" id="dots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>

      <div class="ctrl-section">
        <div class="ctrl-label">✦ Шүүлтүүр</div>
        <div class="filters">
          <button class="filter-btn active" data-f="">Өнгөт</button>
          <button class="filter-btn" data-f="bw">Хар цагаан</button>
          <button class="filter-btn" data-f="sepia">Сепиа</button>
          <button class="filter-btn" data-f="warm">Дулаан</button>
          <button class="filter-btn" data-f="cool">Хүйтэн</button>
          <button class="filter-btn" data-f="soft">Зөөлөн</button>
          <button class="filter-btn" data-f="vivid">Тод</button>
        </div>
      </div>

      <button class="btn-shoot" id="btn-shoot" onclick="startSequence()">📸 Зураг авах</button>
      <button class="btn-reset" onclick="resetBooth()">↺ Дахин эхлэх</button>

      <div id="done-msg" style="display:none" class="done-badge">
        ✦ Бэлэн! Загвар сонгоод татаж ав ⟶
      </div>
    </div>

    <!-- RIGHT: STRIP -->
    <div class="strip-panel">
      <div class="ctrl-section">
        <div class="ctrl-label">📽 Загварын ангилал</div>
        <div class="theme-cats" id="cats"></div>
        <div class="theme-grid" id="theme-grid"></div>
      </div>

      <div class="ctrl-section">
        <div class="ctrl-label">✎ Өөрийн бичиг (заавал биш)</div>
        <input type="text" class="custom-text" id="custom-text" placeholder="жишээ: Bayraa & Saraa" maxlength="30" oninput="renderPreview()">
      </div>

      <div class="strip-wrap">
        <div class="film-strip" id="strip-preview"></div>
      </div>

      <button class="btn-download" id="btn-dl" disabled onclick="downloadStrip()">⬇ Strip татах</button>
    </div>
  </div>
</div>

<canvas id="export-canvas" style="display:none"></canvas>

<script>
// ============ THEMES ============
const themes = [
  // CLASSIC
  { id:'vintage', cat:'classic', name:'Винтаж', icon:'🎞️', bg:'#e8dcc8', border:'#2a1f14', text:'#8b6a4a', deco:'holes', top:'', bot:'✦ SKETCHBOOTH ✦ {year} ✦', font:'DM Mono' },
  { id:'polaroid', cat:'classic', name:'Полароид', icon:'📷', bg:'#fafafa', border:'#999', text:'#555', deco:'plain', top:'', bot:'{date}', font:'Caveat' },

  { id:'romantic', cat:'couples', name:'Романтик', icon:'💘', bg:'#fff0f5', border:'#e91e63', text:'#c2185b', deco:'hearts', top:'together ❥', bot:'with love', font:'Caveat' },

  // FRIENDS
  { id:'bff', cat:'friends', name:'Найзууд', icon:'⭐', bg:'#fff59d', border:'#f57f17', text:'#e65100', deco:'stars', top:'✦ besties ✦', bot:'4 EVER', font:'Fredoka' },

  { id:'space', cat:'kids', name:'Сансар', icon:'🚀', bg:'#1a237e', border:'#fff59d', text:'#fff59d', deco:'stars', top:'🚀 to the moon', bot:'astronaut!', font:'Fredoka' },
  { id:'unicorn', cat:'kids', name:'Эвэрт', icon:'🦄', bg:'#f8bbd0', border:'#ad1457', text:'#880e4f', deco:'sparkles', top:'✨ magical ✨', bot:'unicorn vibes', font:'Pacifico' },

  { id:'ocean', cat:'kids', name:'Далай', icon:'🐳', bg:'#b3e5fc', border:'#01579b', text:'#01579b', deco:'waves', top:'🐳 splash!', bot:'sea squad', font:'Fredoka' },

  // HOLIDAY
  { id:'christmas', cat:'holiday', name:'Зул сар', icon:'🎄', bg:'#c62828', border:'#1b5e20', text:'#ffffff', deco:'snow', top:'❄ merry ❄', bot:'ho ho ho 🎄', font:'Pacifico' },
  { id:'halloween', cat:'holiday', name:'Halloween', icon:'🎃', bg:'#212121', border:'#ff6f00', text:'#ff6f00', deco:'spooky', top:'🎃 spooky', bot:'boo! 👻', font:'Bungee' },
  { id:'birthday', cat:'holiday', name:'Төрсөн өдөр', icon:'🎂', bg:'#fff9c4', border:'#d32f2f', text:'#c2185b', deco:'confetti', top:'🎂 birthday 🎉', bot:'wish big!', font:'Pacifico' },
  { id:'newyear', cat:'holiday', name:'Шинэ жил', icon:'✨', bg:'#0d47a1', border:'#ffd54f', text:'#ffd54f', deco:'sparkles', top:'✦ {year} ✦', bot:"cheers!", font:'Pacifico' }
];

const catLabels = {
  classic: '📽 Сонгодог',
  couples: '💕 Хосууд',
  friends: '⭐ Найзууд',
  kids: '🦄 Хүүхдэд',
  holiday: '🎄 Баяр'
};

const decoChars = {
  holes: null, // drawn as rects
  hearts: ['♥','♡','♥'],
  'hearts-sm': ['·♥·','·♥·','·♥·'],
  stars: ['★','✦','★'],
  sparkles: ['✦','✧','✦','✧'],
  dots: ['•','•','•','•','•'],
  confetti: ['✦','◆','●','✦','◆'],
  snow: ['❄','❅','❄','❅','❄'],
  spooky: ['🦇','👻','🦇'],
  paws: ['🐾','🐾','🐾'],
  waves: ['~','≈','~','≈','~'],
  dino: ['🌿','🦕','🌿'],
  plain: null
};

// ============ STATE ============
let stream, currentFilter = '', photos = [], shooting = false;
let currentTheme = themes[0];
let currentCat = 'classic';
let useFrontCam = true;

// ============ INIT ============
async function initCamera(facing = 'user') {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 960 } },
      audio: false
    });
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'grid';
    const v = document.getElementById('video');
    v.srcObject = stream;
    v.classList.toggle('no-mirror', facing === 'environment');
    await v.play();
    renderCatTabs();
    renderThemes();
    renderPreview();
  } catch (e) {
    document.getElementById('start-screen').innerHTML =
      `<div class="cam-error">⚠ Камер нээж чадсангүй.<br><small>${e.message}</small><br><br>
       <button class="btn-start" onclick="initCamera()">Дахин оролдох</button></div>`;
  }
}

async function flipCamera() {
  useFrontCam = !useFrontCam;
  await initCamera(useFrontCam ? 'user' : 'environment');
}

// ============ FILTERS ============
document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    currentFilter = b.dataset.f;
    document.getElementById('video').className = currentFilter ? `f-${currentFilter}` : '';
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x === b));
  });
});

// ============ THEMES UI ============
function renderCatTabs() {
  const wrap = document.getElementById('cats');
  wrap.innerHTML = Object.entries(catLabels).map(([k,v]) =>
    `<button class="cat-btn ${k===currentCat?'active':''}" onclick="selectCat('${k}')">${v}</button>`
  ).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCatTabs();
  renderThemes();
}

function renderThemes() {
  const grid = document.getElementById('theme-grid');
  const list = themes.filter(t => t.cat === currentCat);
  grid.innerHTML = list.map(t => `
    <div class="theme-card ${t.id===currentTheme.id?'active':''}" onclick="selectTheme('${t.id}')">
      <div class="theme-swatch" style="background:${t.bg};border-color:${t.border}">
        <div class="icon">${t.icon}</div>
      </div>
      <div class="theme-name">${t.name}</div>
    </div>
  `).join('');
}

function selectTheme(id) {
  currentTheme = themes.find(t => t.id === id);
  renderThemes();
  renderPreview();
}

// ============ PREVIEW ============
function renderPreview() {
  const t = currentTheme;
  const strip = document.getElementById('strip-preview');
  const customText = document.getElementById('custom-text').value.trim();
  const year = new Date().getFullYear();
  const date = new Date().toLocaleDateString();
  const topText = (customText && !t.top) ? customText : t.top.replace('{year}', year).replace('{date}', date);
  const botText = customText ? customText : t.bot.replace('{year}', year).replace('{date}', date);

  strip.style.background = t.bg;
  strip.style.borderColor = t.border;

  let html = '';

  // Top decoration
  if (t.deco === 'holes') {
    html += `<div class="strip-deco-row" style="color:${t.border}">${'■ '.repeat(8).trim().split(' ').map(()=>`<span style="display:inline-block;width:8px;height:6px;background:${t.border};opacity:0.7;border-radius:1px"></span>`).join('')}</div>`;
  } else if (decoChars[t.deco]) {
    html += `<div class="strip-deco-row" style="color:${t.text}">${decoChars[t.deco].map(c=>`<span>${c}</span>`).join('')}</div>`;
  }

  // Header text
  if (topText) {
    html += `<div class="strip-header" style="color:${t.text};font-family:'${t.font}',cursive">${escapeHtml(topText)}</div>`;
  }

  // Photo slots with inter-photo decoration
  for (let i = 0; i < 4; i++) {
    const labels = ['①','②','③','④'];
    const photo = photos[i];
    html += `<div class="photo-slot" style="border-color:${t.border}40">${photo ? `<img src="${photo}">` : `<span class="empty-icon" style="color:${t.text}">${labels[i]}</span>`}</div>`;
    if (i < 3) {
      html += `<div class="photo-gap" style="color:${t.text};font-size:0.7rem">${getGapDeco(t.deco)}</div>`;
    }
  }

  // Footer text
  if (botText) {
    html += `<div class="strip-footer" style="color:${t.text};font-family:'${t.font}',monospace">${escapeHtml(botText)}</div>`;
  }

  // Bottom decoration
  if (t.deco === 'holes') {
    html += `<div class="strip-deco-row" style="color:${t.border}">${Array(8).fill(0).map(()=>`<span style="display:inline-block;width:8px;height:6px;background:${t.border};opacity:0.7;border-radius:1px"></span>`).join('')}</div>`;
  } else if (decoChars[t.deco]) {
    html += `<div class="strip-deco-row" style="color:${t.text}">${decoChars[t.deco].map(c=>`<span>${c}</span>`).join('')}</div>`;
  }

  strip.innerHTML = html;
}

function getGapDeco(deco) {
  const gaps = {
    hearts: '♥ ♥ ♥',
    'hearts-sm': '· ♥ ·',
    stars: '✦ ✦ ✦',
    sparkles: '✧ ✦ ✧',
    confetti: '◆ ● ◆',
    snow: '❄ ❅ ❄',
    spooky: '🦇 👻 🦇',
    paws: '🐾 🐾',
    waves: '∼ ∼ ∼',
    dino: '🌿 🦴 🌿',
    dots: '• • •'
  };
  return gaps[deco] || '';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ SHOOTING ============
async function startSequence() {
  if (shooting) return;
  shooting = true;
  photos = [];
  document.getElementById('btn-shoot').disabled = true;
  document.getElementById('done-msg').style.display = 'none';
  resetDots();
  renderPreview();
  for (let i = 0; i < 4; i++) {
    setDot(i, 'filled');
    await countdownAndSnap(i);
    setDot(i, 'done');
    if (i < 3) await sleep(700);
  }
  shooting = false;
  document.getElementById('done-msg').style.display = 'block';
  document.getElementById('btn-shoot').disabled = false;
  document.getElementById('btn-dl').disabled = false;
}

function resetDots() {
  for (let i = 0; i < 4; i++) document.getElementById(`d${i}`).className = 'dot';
}
function setDot(i, cls) {
  const d = document.getElementById(`d${i}`);
  d.className = 'dot ' + cls;
}

const labels = ['Бэлэн боллоо!', 'Инээмсэглэ!', 'Сүрхий байна!', 'Сүүлчийнх!'];

async function countdownAndSnap(idx) {
  const overlay = document.getElementById('overlay');
  const numEl = document.getElementById('count-num');
  const lblEl = document.getElementById('count-label');
  overlay.classList.add('show');
  lblEl.textContent = labels[idx];
  for (let n = 3; n >= 1; n--) {
    numEl.textContent = n;
    numEl.style.animation = 'none';
    numEl.offsetHeight;
    numEl.style.animation = 'pop 0.4s ease';
    await sleep(900);
  }
  overlay.classList.remove('show');
  await sleep(80);
  snapPhoto(idx);
}

function snapPhoto(idx) {
  const flash = document.getElementById('flash');
  flash.classList.add('go');
  setTimeout(() => flash.classList.remove('go'), 180);

  const video = document.getElementById('video');
  const cv = document.getElementById('canvas');
  cv.width = video.videoWidth || 640;
  cv.height = video.videoHeight || 480;
  const ctx = cv.getContext('2d');

  if (useFrontCam) {
    ctx.save();
    ctx.translate(cv.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    ctx.restore();
  } else {
    ctx.drawImage(video, 0, 0);
  }

  if (currentFilter) {
    const filters = {
      bw: 'grayscale(1)', sepia: 'sepia(0.85) contrast(1.05)',
      warm: 'sepia(0.3) saturate(1.3) brightness(1.05)',
      cool: 'saturate(0.7) hue-rotate(20deg) brightness(0.95)',
      vivid: 'saturate(1.8) contrast(1.1)',
      soft: 'brightness(1.08) contrast(0.95) saturate(0.85)'
    };
    const off = document.createElement('canvas');
    off.width = cv.width; off.height = cv.height;
    const octx = off.getContext('2d');
    octx.drawImage(cv, 0, 0);
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.filter = filters[currentFilter];
    ctx.drawImage(off, 0, 0);
    ctx.filter = 'none';
  }

  photos[idx] = cv.toDataURL('image/jpeg', 0.92);
  renderPreview();
}

// ============ DOWNLOAD ============
async function downloadStrip() {
  const t = currentTheme;
  const ec = document.getElementById('export-canvas');
  const customText = document.getElementById('custom-text').value.trim();
  const year = new Date().getFullYear();
  const date = new Date().toLocaleDateString();
  const topText = (customText && !t.top) ? customText : t.top.replace('{year}', year).replace('{date}', date);
  const botText = customText ? customText : t.bot.replace('{year}', year).replace('{date}', date);

  // 2x resolution
  const scale = 2;
  const pw = 400 * scale, ph = 300 * scale;
  const pad = 24 * scale, gap = 12 * scale;
  const decoH = 22 * scale, textH = 28 * scale;
  const hasTop = !!topText, hasBot = !!botText;
  const hasDecoTop = t.deco === 'holes' || decoChars[t.deco];
  const hasDecoBot = hasDecoTop;

  let totalH = pad;
  if (hasDecoTop) totalH += decoH + gap/2;
  if (hasTop) totalH += textH + gap/2;
  totalH += 4 * ph + 3 * gap;
  if (hasBot) totalH += textH + gap/2;
  if (hasDecoBot) totalH += decoH + gap/2;
  totalH += pad;

  ec.width = pw + pad*2;
  ec.height = totalH;

  const ctx = ec.getContext('2d');

  // BG
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, ec.width, ec.height);

  // Border
  ctx.strokeStyle = t.border;
  ctx.lineWidth = 4 * scale;
  ctx.strokeRect(2*scale, 2*scale, ec.width - 4*scale, ec.height - 4*scale);

  let y = pad;

  // Top decoration
  if (hasDecoTop) {
    drawDeco(ctx, t, pad, y, pw, decoH);
    y += decoH + gap/2;
  }

  // Top text
  if (hasTop) {
    drawText(ctx, topText, ec.width/2, y + textH*0.7, t, textH*0.7, true);
    y += textH + gap/2;
  }

  // Photos
  for (let i = 0; i < 4; i++) {
    if (photos[i]) {
      const img = new Image();
      await new Promise(res => { img.onload = res; img.src = photos[i]; });
      ctx.drawImage(img, pad, y, pw, ph);
      // subtle photo border
      ctx.strokeStyle = t.border;
      ctx.lineWidth = 1.5 * scale;
      ctx.strokeRect(pad, y, pw, ph);
    } else {
      ctx.fillStyle = '#bbb';
      ctx.fillRect(pad, y, pw, ph);
    }
    y += ph;
    if (i < 3) y += gap;
  }

  // Bottom text
  if (hasBot) {
    y += gap/2;
    drawText(ctx, botText, ec.width/2, y + textH*0.65, t, textH*0.6, false);
    y += textH;
  }

  // Bottom decoration
  if (hasDecoBot) {
    y += gap/2;
    drawDeco(ctx, t, pad, y, pw, decoH);
  }

  const a = document.createElement('a');
  a.download = `sketchbooth-${t.id}-${Date.now()}.jpg`;
  a.href = ec.toDataURL('image/jpeg', 0.95);
  a.click();
}

function drawText(ctx, text, x, y, theme, size, isHeader) {
  const fontMap = {
    'Caveat': '"Caveat", cursive',
    'DM Mono': '"DM Mono", monospace',
    'Pacifico': '"Pacifico", cursive',
    'Bungee': '"Bungee", sans-serif',
    'Fredoka': '"Fredoka", sans-serif'
  };
  ctx.fillStyle = theme.text;
  ctx.font = `${isHeader ? '600' : '500'} ${size}px ${fontMap[theme.font] || 'sans-serif'}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(text, x, y);
}

function drawDeco(ctx, theme, x, y, w, h) {
  const scale = 2;
  if (theme.deco === 'holes') {
    const holeW = 14, holeH = 9, count = 8;
    const stepX = w / count;
    ctx.fillStyle = theme.border;
    ctx.globalAlpha = 0.7;
    for (let i = 0; i < count; i++) {
      const hx = x + i*stepX + (stepX - holeW*scale/2)/2;
      roundRect(ctx, hx, y + h/2 - holeH*scale/4, holeW*scale*0.8, holeH*scale*0.8, 2*scale);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    return;
  }

  if (theme.deco === 'hearts' || theme.deco === 'hearts-sm') {
    const count = theme.deco === 'hearts-sm' ? 7 : 5;
    const stepX = w / count;
    const sz = theme.deco === 'hearts-sm' ? 7*scale : 10*scale;
    ctx.fillStyle = theme.text;
    for (let i = 0; i < count; i++) {
      drawHeart(ctx, x + i*stepX + stepX/2, y + h/2, sz);
    }
    return;
  }

  if (theme.deco === 'stars') {
    const count = 5;
    const stepX = w / count;
    ctx.fillStyle = theme.text;
    for (let i = 0; i < count; i++) {
      drawStar(ctx, x + i*stepX + stepX/2, y + h/2, 9*scale);
    }
    return;
  }

  if (theme.deco === 'sparkles') {
    const count = 7;
    const stepX = w / count;
    ctx.fillStyle = theme.text;
    for (let i = 0; i < count; i++) {
      drawSparkle(ctx, x + i*stepX + stepX/2, y + h/2, 7*scale);
    }
    return;
  }

  if (theme.deco === 'dots') {
    const count = 12;
    const stepX = w / count;
    ctx.fillStyle = theme.text;
    for (let i = 0; i < count; i++) {
      ctx.beginPath();
      ctx.arc(x + i*stepX + stepX/2, y + h/2, 3*scale, 0, Math.PI*2);
      ctx.fill();
    }
    return;
  }

  if (theme.deco === 'confetti') {
    const count = 14;
    const stepX = w / count;
    ctx.fillStyle = theme.text;
    for (let i = 0; i < count; i++) {
      const cx = x + i*stepX + stepX/2;
      const cy = y + h/2 + Math.sin(i)*4*scale;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(i * 0.7);
      ctx.fillRect(-3*scale, -1.5*scale, 6*scale, 3*scale);
      ctx.restore();
    }
    return;
  }

  if (theme.deco === 'snow') {
    const count = 10;
    const stepX = w / count;
    ctx.fillStyle = theme.text;
    ctx.font = `${14*scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < count; i++) {
      ctx.fillText(i%2 ? '❅' : '❄', x + i*stepX + stepX/2, y + h/2);
    }
    return;
  }

  if (theme.deco === 'waves') {
    ctx.strokeStyle = theme.text;
    ctx.lineWidth = 2*scale;
    ctx.beginPath();
    const amp = 4*scale, freq = 18*scale;
    ctx.moveTo(x, y + h/2);
    for (let i = 0; i <= w; i += 2) {
      ctx.lineTo(x + i, y + h/2 + Math.sin(i/freq * Math.PI) * amp);
    }
    ctx.stroke();
    return;
  }

  if (theme.deco === 'spooky' || theme.deco === 'paws' || theme.deco === 'dino') {
    const chars = decoChars[theme.deco];
    const count = chars.length * 2;
    const stepX = w / count;
    ctx.fillStyle = theme.text;
    ctx.font = `${15*scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < count; i++) {
      ctx.fillText(chars[i % chars.length], x + i*stepX + stepX/2, y + h/2);
    }
    return;
  }
}

function drawHeart(ctx, cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(size/20, size/20);
  ctx.beginPath();
  ctx.moveTo(0, 6);
  ctx.bezierCurveTo(0, 3, -3, 0, -7, 0);
  ctx.bezierCurveTo(-13, 0, -13, 8, -13, 8);
  ctx.bezierCurveTo(-13, 14, -6, 17, 0, 22);
  ctx.bezierCurveTo(6, 17, 13, 14, 13, 8);
  ctx.bezierCurveTo(13, 8, 13, 0, 7, 0);
  ctx.bezierCurveTo(3, 0, 0, 3, 0, 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawStar(ctx, cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? size : size * 0.4;
    const a = (i * Math.PI) / 5 - Math.PI/2;
    const px = Math.cos(a) * r;
    const py = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawSparkle(ctx, cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  // 4-point sparkle
  const arms = [[0,-size],[size*0.25,-size*0.25],[size,0],[size*0.25,size*0.25],[0,size],[-size*0.25,size*0.25],[-size,0],[-size*0.25,-size*0.25]];
  ctx.moveTo(arms[0][0], arms[0][1]);
  for (let i = 1; i < arms.length; i++) ctx.lineTo(arms[i][0], arms[i][1]);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ============ RESET ============
function resetBooth() {
  photos = [];
  shooting = false;
  document.getElementById('btn-shoot').disabled = false;
  document.getElementById('btn-dl').disabled = true;
  document.getElementById('done-msg').style.display = 'none';
  resetDots();
  renderPreview();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
